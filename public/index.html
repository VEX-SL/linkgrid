<!-- public/links.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/docs/favicon">
</head>
<body>
    <div class="container">
        <header>
            <div id="profile-avatar-container"></div>
            <h1 class="name" id="profile-name"></h1>
            <p class="bio" id="profile-bio"></p>
        </header>

        <main>
            <div class="links-grid" id="links-container"></div>
        </main>

        <footer>
            <p id="footer-text"></p>
        </footer>
    </div>

    <!-- SortableJS (included but not used in links mode) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="/static/script.js"></script>
    <script>
        window.PAGE_MODE = 'links';
    </script>
</body>
</html>
