<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/docs/favicon">
</head>

<body>
    <div class="container">
        <header>
            <div id="profile-avatar-container"></div>
            <h1 class="name" id="profile-name"></h1>
            <p class="bio" id="profile-bio"></p>
        </header>

        <main>
            <div class="links-grid" id="links-container"></div>
            <div id="admin-button-container" style="display: none; text-align: center; margin-top: 2rem;">
                <button id="add-link-btn" class="add-btn">
                    <i class="fa-solid fa-plus"></i> <span>Add New Link</span>
                </button>
            </div>
            <div id="settings-page-button" style="display: none; text-align: center; margin-top: 1rem;">
                <button id="settings-btn" class="add-btn"></button>
            </div>
        </main>

        <footer>
            <p id="footer-text"></p>
        </footer>
    </div>

    <div id="link-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title"></h2>
            <form id="link-form">
                <div class="form-group">
                    <label for="link-name" id="label-name"></label>
                    <input type="text" id="link-name" required>
                </div>
                <div class="form-group">
                    <label for="link-url" id="label-url"></label>
                    <input type="url" id="link-url" required>
                </div>
                <div class="form-group">
                    <label for="link-icon" id="label-icon"></label>
                    <input type="text" id="link-icon" required>
                    <small id="icon-help"></small>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn"></button>
            </form>
        </div>
    </div>

    <!-- SortableJS for drag & drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script type="module" src="/static/script.js"></script>
</body>


</html>
