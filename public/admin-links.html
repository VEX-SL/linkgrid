<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Links - LinkGrid Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="/docs/favicon">
    <style>
        /* Admin-specific styles (same as /admin and /settings) */
        :root {
            --bg: #0f1115;
            --card: #181b22;
            --card-2: #1f2430;
            --border: #2a2f3a;
            --text: #f1f3f7;
            --text-muted: #9aa4b2;
            --accent: #7c5cff;
            --accent-soft: rgba(124, 92, 255, 0.15);
            --danger: #ff4d6d;
        }

        body {
            background: radial-gradient(circle at top, #141824, #0f1115 60%);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .admin-header h1 {
            font-size: 2rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .admin-header h1 i {
            color: var(--accent);
        }

        .admin-actions {
            display: flex;
            gap: 1rem;
        }

        .btn {
            background: var(--card-2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: #8f6cff;
            border-color: #8f6cff;
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #ff6d8a;
            border-color: #ff6d8a;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .link-card {
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.2s;
            position: relative;
            cursor: grab;
        }

        .link-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .link-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .link-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card);
            border-radius: 10px;
            color: var(--accent);
            font-size: 1.5rem;
        }

        .link-icon img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }

        .link-info {
            flex: 1;
        }

        .link-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .link-url {
            font-size: 0.85rem;
            color: var(--text-muted);
            word-break: break-all;
        }

        .delete-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--danger);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            border: none;
        }

        .link-card:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #ff6d8a;
            transform: scale(1.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--card-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .form-group small {
            display: block;
            margin-top: 0.5rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .form-group small a {
            color: var(--accent);
            text-decoration: none;
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.8rem 2rem;
            color: var(--text);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>
                <i class="fa-solid fa-pen-to-square"></i>
                Manage Links
            </h1>
            <div class="admin-actions">
                <a href="/admin" class="btn">
                    <i class="fa-solid fa-chart-simple"></i> Analytics
                </a>
                <a href="/settings" class="btn">
                    <i class="fa-solid fa-gear"></i> Settings
                </a>
                <a href="/" class="btn">
                    <i class="fa-solid fa-eye"></i> View Site
                </a>
                <a href="/admin/logout" class="btn btn-danger">
                    <i class="fa-solid fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>

        <div class="admin-header" style="justify-content: space-between; margin-top: 1rem;">
            <button class="btn btn-primary" id="addLinkBtn">
                <i class="fa-solid fa-plus"></i> Add New Link
            </button>
        </div>

        <div id="linksContainer" class="links-grid">
            <div class="loading">Loading links...</div>
        </div>
    </div>

    <!-- Add/Edit Link Modal -->
    <div class="modal" id="linkModal">
        <div class="modal-content">
            <h2><i class="fa-solid fa-link"></i> Add / Edit Link</h2>
            <form id="linkForm">
                <div class="form-group">
                    <label for="linkName">Platform name</label>
                    <input type="text" id="linkName" required placeholder="e.g. GitHub">
                </div>
                <div class="form-group">
                    <label for="linkUrl">URL</label>
                    <input type="url" id="linkUrl" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="linkIcon">Icon class</label>
                    <input type="text" id="linkIcon" required placeholder="auto or fa-brands fa-github">
                    <small>Enter "auto" for automatic favicon, or a <a href="https://fontawesome.com/icons" target="_blank">Font Awesome</a> class</small>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="cancelModal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script>
        // ==================== STATE ====================
        let links = [];
        let filteredLinks = [];
        let sortableInstance = null;
        let currentSettings = {};

        // ==================== DOM ELEMENTS ====================
        const linksContainer = document.getElementById('linksContainer');
        const addLinkBtn = document.getElementById('addLinkBtn');
        const linkModal = document.getElementById('linkModal');
        const linkForm = document.getElementById('linkForm');
        const cancelModal = document.getElementById('cancelModal');
        const toast = document.getElementById('toast');
        const linkNameInput = document.getElementById('linkName');
        const linkUrlInput = document.getElementById('linkUrl');
        const linkIconInput = document.getElementById('linkIcon');

        // ==================== UTILITIES ====================
        function showToast(message, duration = 3000) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, duration);
        }

        function extractDomain(url) {
            try {
                const urlObj = new URL(url);
                return urlObj.hostname;
            } catch (e) {
                const match = url.match(/^(?:https?:\/\/)?(?:[^@\n]+@)?(?:www\.)?([^:/\n?]+)/im);
                return match ? match[1] : null;
            }
        }

        function getFaviconUrl(url) {
            const domain = extractDomain(url);
            if (!domain) return null;
            return `https://icons.duckduckgo.com/ip3/${domain}.ico`;
        }

        // ==================== API CALLS ====================
        async function fetchSettings() {
            try {
                const response = await fetch('/api/settings');
                if (!response.ok) throw new Error('Failed to fetch settings');
                currentSettings = await response.json();
            } catch (error) {
                console.error('Error fetching settings:', error);
            }
        }

        async function fetchLinks() {
            try {
                const response = await fetch('/api/links');
                if (!response.ok) throw new Error('Failed to fetch links');
                links = await response.json();
                filteredLinks = [...links];
                renderLinks();
            } catch (error) {
                console.error('Error fetching links:', error);
                linksContainer.innerHTML = '<div class="loading">Error loading links. <button onclick="location.reload()">Retry</button></div>';
            }
        }

        async function saveLinks(newLinks) {
            try {
                const response = await fetch('/api/links', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newLinks)
                });
                if (!response.ok) throw new Error('Failed to save');
                links = newLinks;
                filteredLinks = [...links];
                renderLinks();
                showToast('Links saved successfully! ✨');
                return true;
            } catch (error) {
                console.error('Error saving links:', error);
                showToast('Failed to save links!', 3000);
                return false;
            }
        }

        // ==================== RENDERING ====================
        function renderLinks() {
            if (sortableInstance) {
                sortableInstance.destroy();
                sortableInstance = null;
            }

            if (!filteredLinks || filteredLinks.length === 0) {
                linksContainer.innerHTML = '<div class="loading">No links found. Click "Add New Link" to create one.</div>';
                return;
            }

            linksContainer.innerHTML = '';

            filteredLinks.forEach((link, index) => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.setAttribute('data-index', index);
                card.linkData = { ...link };

                const useFavicon = link.icon && link.icon.toLowerCase() === 'auto';
                let iconHtml = '';
                if (useFavicon) {
                    const faviconUrl = getFaviconUrl(link.url);
                    if (faviconUrl) {
                        iconHtml = `<img src="${faviconUrl}" alt="favicon" onerror="this.onerror=null; this.src=''; this.parentElement.innerHTML='<i class=\\'fa-solid fa-globe\\'></i>';">`;
                    } else {
                        iconHtml = '<i class="fa-solid fa-globe"></i>';
                    }
                } else {
                    iconHtml = `<i class="${link.icon}"></i>`;
                }

                card.innerHTML = `
                    <div class="link-content">
                        <div class="link-icon">${iconHtml}</div>
                        <div class="link-info">
                            <div class="link-name">${link.name}</div>
                            <div class="link-url">${link.url}</div>
                        </div>
                    </div>
                    <button class="delete-btn" title="Delete link"><i class="fa-solid fa-trash"></i></button>
                `;

                // Delete button handler
                const deleteBtn = card.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', async (e) => {
                    e.stopPropagation();
                    const updatedLinks = links.filter((_, i) => i !== index);
                    await saveLinks(updatedLinks);
                });

                linksContainer.appendChild(card);
            });

            // Initialize sortable
            sortableInstance = new Sortable(linksContainer, {
                animation: 150,
                handle: '.link-card',
                draggable: '.link-card',
                ghostClass: 'dragging',
                onEnd: async (evt) => {
                    const newOrder = [];
                    const cards = document.querySelectorAll('.link-card');
                    cards.forEach(card => {
                        newOrder.push({ ...card.linkData });
                    });
                    await saveLinks(newOrder);
                }
            });
        }

        // ==================== MODAL HANDLING ====================
        function openModal(link = null) {
            if (link) {
                linkNameInput.value = link.name;
                linkUrlInput.value = link.url;
                linkIconInput.value = link.icon;
            } else {
                linkForm.reset();
            }
            linkModal.classList.add('show');
        }

        function closeModal() {
            linkModal.classList.remove('show');
        }

        addLinkBtn.addEventListener('click', () => openModal());

        cancelModal.addEventListener('click', closeModal);

        linkModal.addEventListener('click', (e) => {
            if (e.target === linkModal) closeModal();
        });

        linkForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newLink = {
                name: linkNameInput.value.trim(),
                url: linkUrlInput.value.trim(),
                icon: linkIconInput.value.trim() || 'fa-solid fa-globe',
                clicks: 0
            };
            const updatedLinks = [...links, newLink];
            const success = await saveLinks(updatedLinks);
            if (success) {
                closeModal();
                linkForm.reset();
            }
        });

        // ==================== INIT ====================
        (async function init() {
            await fetchSettings();
            await fetchLinks();
        })();
    </script>
</body>
</html>
